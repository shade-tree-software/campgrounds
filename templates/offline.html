<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#002868">
<title>Offline — EKKO Trips</title>
<style>
  /* Self-contained on purpose: this page is the service worker's offline
     fallback, so it must render with zero other requests. */
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #002868;
    color: #fff;
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 2rem;
    box-sizing: border-box;
  }
  .card { max-width: 26rem; }
  .tent { font-size: 3rem; margin-bottom: .5rem; }
  h1 { font-size: 1.4rem; margin: 0 0 .75rem; color: #c9a84c; }
  p { line-height: 1.5; opacity: .9; margin: 0 0 1.5rem; }
  a, button {
    display: inline-block;
    background: #bf0a30;
    color: #fff;
    border: none;
    text-decoration: none;
    font-size: 1rem;
    font-weight: 600;
    font-family: inherit;
    padding: .7rem 1.5rem;
    border-radius: 8px;
    cursor: pointer;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="tent">&#9978;</div>
    <h1>No signal out here</h1>
    <p>You're offline and this page isn't saved on your device yet.
       Trips and photos you've viewed recently should still open.</p>
    <button onclick="location.reload()">Try again</button>
  </div>
</body>
</html>
