<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>
<style>
  :root {
    --navy: #002868;
    --red: #bf0a30;
    --white: #fff;
    --offwhite: #f7f8fc;
    --gray: #555;
    --gray-light: #d5d8de;
    --gold: #c9a84c;
    --shadow: 0 2px 8px rgba(0,0,0,.12);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--offwhite);
    color: #333;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }

  .login-card {
    background: var(--white);
    border-radius: 10px;
    box-shadow: var(--shadow);
    padding: 2rem;
    width: 100%;
    max-width: 360px;
  }

  .login-card h1 {
    font-size: 1.3rem;
    color: var(--navy);
    margin-bottom: 1.5rem;
    text-align: center;
  }

  .login-card label {
    display: block;
    font-size: .8rem;
    font-weight: 600;
    color: var(--gray);
    margin-bottom: .25rem;
  }

  .login-card input[type="text"],
  .login-card input[type="password"] {
    width: 100%;
    padding: .6rem .75rem;
    border: 1px solid var(--gray-light);
    border-radius: 6px;
    font-size: .9rem;
    font-family: inherit;
    margin-bottom: 1rem;
  }

  .login-card input:focus {
    outline: none;
    border-color: var(--red);
  }

  .login-card button {
    width: 100%;
    background: var(--red);
    color: var(--white);
    border: none;
    padding: .7rem;
    border-radius: 6px;
    font-size: .95rem;
    font-weight: 600;
    cursor: pointer;
  }

  .login-card button:hover {
    background: var(--navy);
  }

  .error {
    background: #fce8ec;
    color: #c62828;
    padding: .5rem .75rem;
    border-radius: 6px;
    font-size: .85rem;
    margin-bottom: 1rem;
    text-align: center;
  }

  .back-link {
    display: block;
    text-align: center;
    margin-top: 1rem;
    font-size: .85rem;
    color: var(--navy);
    text-decoration: none;
  }

  .back-link:hover { color: var(--red); }
</style>
</head>
<body>
  <div class="login-card">
    <h1>Login</h1>
    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}
    <form method="POST">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" required autofocus>
      <label for="password">Password</label>
      <input type="password" id="password" name="password" required>
      <button type="submit">Log In</button>
    </form>
    <a class="back-link" href="/">&larr; Back to trips</a>
  </div>
</body>
</html>
