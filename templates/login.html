<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>
<style>
  :root {
    --navy: #002868;
    --navy-light: #1a3f7a;
    --red: #bf0a30;
    --white: #fff;
    --offwhite: #f7f8fc;
    --gray: #555;
    --gray-light: #d5d8de;
    --gold: #c9a84c;
    --shadow: 0 2px 8px rgba(0,0,0,.12);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--offwhite);
    color: #333;
  }

  header {
    background: var(--navy);
    color: var(--white);
    padding: 1.5rem 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: var(--shadow);
  }

  header h1 { font-size: 1.6rem; font-weight: 600; }
  header h1 a { color: inherit; text-decoration: none; }

  .stats {
    display: flex;
    gap: 1.5rem;
    font-size: .9rem;
    opacity: .9;
  }

  .stats span { font-weight: 700; color: var(--gold); }

  nav {
    background: var(--navy-light);
    padding: .5rem 2rem;
    display: flex;
    gap: 1.5rem;
    font-size: .9rem;
  }

  nav a {
    color: rgba(255,255,255,.75);
    text-decoration: none;
    padding: .25rem 0;
  }

  nav a:hover { color: var(--white); }

  .login-wrapper {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: calc(100vh - 120px);
  }

  .login-card {
    background: var(--white);
    border-radius: 10px;
    box-shadow: var(--shadow);
    padding: 2rem;
    width: 100%;
    max-width: 360px;
  }

  .login-card h1 {
    font-size: 1.3rem;
    color: var(--navy);
    margin-bottom: 1.5rem;
    text-align: center;
  }

  .login-card label {
    display: block;
    font-size: .8rem;
    font-weight: 600;
    color: var(--gray);
    margin-bottom: .25rem;
  }

  .login-card input[type="text"],
  .login-card input[type="password"] {
    width: 100%;
    padding: .6rem .75rem;
    border: 1px solid var(--gray-light);
    border-radius: 6px;
    font-size: .9rem;
    font-family: inherit;
    margin-bottom: 1rem;
  }

  .login-card input:focus {
    outline: none;
    border-color: var(--red);
  }

  .login-card button {
    width: 100%;
    background: var(--red);
    color: var(--white);
    border: none;
    padding: .7rem;
    border-radius: 6px;
    font-size: .95rem;
    font-weight: 600;
    cursor: pointer;
  }

  .login-card button:hover {
    background: var(--navy);
  }

  .error {
    background: #fce8ec;
    color: #c62828;
    padding: .5rem .75rem;
    border-radius: 6px;
    font-size: .85rem;
    margin-bottom: 1rem;
    text-align: center;
  }

</style>
</head>
<body>

<header>
  <h1><a href="/">EKKO Trips</a></h1>
  <div class="stats">
    <div><span>{{ trip_count }}</span> trips</div>
    <div><span>{{ night_count }}</span> nights</div>
  </div>
</header>

<nav>
  <a href="/trips/map">Trips Map</a>
  <a href="/trips/calendar">Trips Calendar</a>
  <a href="/campgrounds/waterfront">Waterfront Map</a>
  <a href="/campgrounds/climate">Climate Map</a>
</nav>

<div class="login-wrapper">
  <div class="login-card">
    <h1>Login</h1>
    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}
    <form method="POST">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" required autofocus>
      <label for="password">Password</label>
      <input type="password" id="password" name="password" required>
      <button type="submit">Log In</button>
    </form>
  </div>
</div>
</body>
</html>
