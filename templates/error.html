<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#002868">
<title>{{ code }} — EKKO Trips</title>
<style>
  /* Self-contained on purpose: must render even when the app's data
     layer is what broke (a base.html extend would re-run the trip-stats
     context processor). */
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #002868;
    color: #fff;
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 2rem;
    box-sizing: border-box;
  }
  .card { max-width: 26rem; }
  .code {
    font-size: 4rem;
    font-weight: 800;
    color: #c9a84c;
    line-height: 1;
    margin-bottom: .5rem;
  }
  h1 { font-size: 1.3rem; margin: 0 0 .75rem; }
  p { line-height: 1.5; opacity: .9; margin: 0 0 1.5rem; }
  a {
    display: inline-block;
    background: #bf0a30;
    color: #fff;
    text-decoration: none;
    font-size: 1rem;
    font-weight: 600;
    padding: .7rem 1.5rem;
    border-radius: 8px;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="code">{{ code }}</div>
    <h1>{{ heading }}</h1>
    <p>{{ message }}</p>
    <a href="/">Back to the map</a>
  </div>
</body>
</html>
