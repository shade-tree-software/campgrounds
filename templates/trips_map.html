<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>All Camping Locations — EKKO Trips</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  :root {
    --navy: #002868;
    --navy-light: #1a3f7a;
    --red: #bf0a30;
    --white: #fff;
    --offwhite: #f7f8fc;
    --gray: #555;
    --gray-light: #d5d8de;
    --gold: #c9a84c;
    --shadow: 0 2px 8px rgba(0,0,0,.12);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--offwhite);
    color: #333;
  }

  header {
    background: var(--navy);
    color: var(--white);
    padding: 1.5rem 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: var(--shadow);
  }

  header h1 { font-size: 1.6rem; font-weight: 600; }

  .stats {
    display: flex;
    gap: 1.5rem;
    font-size: .9rem;
    opacity: .9;
  }

  .stats span { font-weight: 700; color: var(--gold); }

  nav {
    background: var(--navy-light);
    padding: .5rem 2rem;
    display: flex;
    align-items: center;
    gap: .5rem;
    font-size: .9rem;
  }

  nav a {
    color: rgba(255,255,255,.75);
    text-decoration: none;
    padding: .25rem 0;
  }

  nav a:hover { color: var(--white); }
  nav a.active { color: var(--gold); border-bottom: 2px solid var(--gold); }

  .nav-group {
    display: flex;
    align-items: center;
    gap: .75rem;
  }


  .nav-group + .nav-group { margin-left: 1.75rem; }

  .nav-label {
    color: rgba(255,255,255,.45);
    font-size: .8rem;
    text-transform: uppercase;
    letter-spacing: .04em;
  }

  .map-section {
    max-width: 1400px;
    margin: 0 auto;
    padding: 1rem 2rem;
  }

  .map-container {
    background: var(--white);
    border-radius: 10px;
    box-shadow: var(--shadow);
    overflow: hidden;
  }

  .map-header {
    padding: .75rem 1.25rem;
    font-size: 1rem;
    font-weight: 600;
    color: var(--navy);
    border-bottom: 1px solid var(--gray-light);
  }

  #all-trips-map {
    height: calc(100vh - 220px);
    min-height: 400px;
    width: 100%;
  }
</style>
</head>
<body>

<header>
  <h1><a href="/" style="color:inherit;text-decoration:none">EKKO Trips</a></h1>
  <div class="stats">
    <div><span>{{ trip_count }}</span> trips</div>
    <div><span>{{ night_count }}</span> nights</div>
  </div>
</header>

<nav>
  <span class="nav-group">
    <span class="nav-label">Trips:</span>
    <a href="/trips/calendar">Calendar</a>
    <a href="/trips/list">List</a>
    <a href="/trips/map" class="active">Map</a>
  </span>
  <span class="nav-group">
    <span class="nav-label">Campgrounds:</span>
    <a href="/campgrounds/waterfront">Waterfront</a>
    <a href="/campgrounds/climate">Climate</a>
  </span>
  {% if current_user.is_authenticated %}
  <a href="/logout?next={{ request.path }}" style="margin-left:auto">Logout</a>
  {% else %}
  <a href="/login?next={{ request.path }}" style="margin-left:auto">Login</a>
  {% endif %}
</nav>

<div class="map-section">
  <div class="map-container">
    <div class="map-header">All Camping Locations</div>
    <div id="all-trips-map"></div>
  </div>
</div>

<script>
const TRIPS = {{ trips | tojson }};
const FAMILY = {{ family_locations | tojson }};
const HOME = {{ home | tojson }};

const map = L.map('all-trips-map');
const streets = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OpenStreetMap contributors',
  maxZoom: 18,
}).addTo(map);
const satellite = L.layerGroup([
  L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
    attribution: '&copy; Esri',
    maxZoom: 19,
  }),
  L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}', {
    maxZoom: 19,
  }),
]);
L.control.layers({ 'Map': streets, 'Satellite': satellite }).addTo(map);

// Home marker
if (HOME) {
  const homeIcon = L.divIcon({
    className: '',
    html: `<div style="
      width:24px;height:24px;border-radius:50%;
      background:#c9a84c;
      display:flex;align-items:center;justify-content:center;
      border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.4);
    "><svg width="14" height="14" viewBox="0 0 20 20" fill="#002868"><path d="M10 2 L2 9 L5 9 L5 17 L9 17 L9 12 L11 12 L11 17 L15 17 L15 9 L18 9 Z"/></svg></div>`,
    iconSize: [24, 24],
    iconAnchor: [12, 12],
  });
  L.marker(HOME, { icon: homeIcon, zIndexOffset: 1000 }).addTo(map)
    .bindPopup('<strong>Home</strong>');
}

// Collect unique locations across all trips
const locMap = {};
TRIPS.forEach(trip => {
  trip.stays.forEach(stay => {
    if (!stay.lat || !stay.lng) return;
    const key = stay.lat.toFixed(4) + ',' + stay.lng.toFixed(4);
    if (!locMap[key]) {
      locMap[key] = { lat: stay.lat, lng: stay.lng, place: stay.place, locale: stay.locale, state: stay.state, trips: [] };
    }
    if (!locMap[key].trips.some(t => t.id === trip.id)) {
      locMap[key].trips.push(trip);
    }
  });
});

const bounds = HOME ? [HOME] : [];
Object.values(locMap).forEach(loc => {
  const ll = [loc.lat, loc.lng];
  bounds.push(ll);

  const visits = loc.trips.length;
  const radius = Math.min(6 + visits * 2, 14);

  const marker = L.circleMarker(ll, {
    radius: radius,
    fillColor: '#bf0a30',
    color: '#002868',
    weight: 2,
    opacity: 1,
    fillOpacity: 0.8,
  }).addTo(map);

  let popup = `<strong>${loc.place}</strong><br>${loc.locale}, ${loc.state}<br>${visits} visit${visits > 1 ? 's' : ''}`;
  popup += '<div style="margin-top:4px;font-size:12px;">';
  loc.trips.forEach(t => {
    const d = new Date(t.start + 'T00:00:00');
    const fmt = d.toLocaleDateString('en-US', { month: 'short', year: 'numeric' });
    popup += `<a href="/trips/${t.id}" style="display:block;color:#002868;">Trip ${t.id}: ${fmt} — ${t.summary}</a>`;
  });
  popup += '</div>';
  marker.bindPopup(popup, { maxWidth: 280 });
});

// Family location markers
FAMILY.forEach(fam => {
  const ll = [fam.lat, fam.lng];
  const famIcon = L.divIcon({
    className: '',
    html: `<div style="
      width:24px;height:24px;border-radius:50%;
      background:#c9a84c;
      display:flex;align-items:center;justify-content:center;
      border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.4);
    "><svg width="14" height="14" viewBox="0 0 20 20" fill="#002868"><path d="M10 2 L2 9 L5 9 L5 17 L9 17 L9 12 L11 12 L11 17 L15 17 L15 9 L18 9 Z"/><circle cx="14" cy="6" r="2.5"/><circle cx="17" cy="6" r="2.5"/></svg></div>`,
    iconSize: [24, 24],
    iconAnchor: [12, 12],
  });
  // Check if any stays match this family location (or its driveway)
  const famKey = fam.lat.toFixed(4) + ',' + fam.lng.toFixed(4);
  const drivewayKey = fam.driveway_lat != null
    ? fam.driveway_lat.toFixed(4) + ',' + fam.driveway_lng.toFixed(4)
    : null;
  const loc = locMap[famKey] || (drivewayKey && locMap[drivewayKey]);
  let popup = `<strong>${fam.label}</strong>`;
  if (loc) {
    const visits = loc.trips.length;
    popup += `<br>${visits} visit${visits > 1 ? 's' : ''}`;
    popup += '<div style="margin-top:4px;font-size:12px;">';
    loc.trips.forEach(t => {
      const d = new Date(t.start + 'T00:00:00');
      const fmt = d.toLocaleDateString('en-US', { month: 'short', year: 'numeric' });
      popup += `<a href="/trips/${t.id}" style="display:block;color:#002868;">Trip ${t.id}: ${fmt} — ${t.summary}</a>`;
    });
    popup += '</div>';
  }
  L.marker(ll, { icon: famIcon, zIndexOffset: 900 }).addTo(map)
    .bindPopup(popup, { maxWidth: 280 });
  bounds.push(ll);
});

if (bounds.length) {
  map.fitBounds(bounds, { padding: [30, 30], maxZoom: 8 });
}
</script>

</body>
</html>
