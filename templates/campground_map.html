<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ title }} — EKKO Trips</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  :root {
    --navy: #002868;
    --navy-light: #1a3f7a;
    --red: #bf0a30;
    --white: #fff;
    --offwhite: #f7f8fc;
    --gray: #555;
    --gray-light: #d5d8de;
    --gold: #c9a84c;
    --shadow: 0 2px 8px rgba(0,0,0,.12);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--offwhite);
    color: #333;
  }

  header {
    background: var(--navy);
    color: var(--white);
    padding: 1.5rem 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: var(--shadow);
  }

  header h1 { font-size: 1.6rem; font-weight: 600; }

  .stats {
    display: flex;
    gap: 1.5rem;
    font-size: .9rem;
    opacity: .9;
  }

  nav {
    background: var(--navy-light);
    padding: .5rem 2rem;
    display: flex;
    gap: 1.5rem;
    font-size: .9rem;
  }

  nav a {
    color: rgba(255,255,255,.75);
    text-decoration: none;
    padding: .25rem 0;
  }

  nav a:hover { color: var(--white); }
  nav a.active { color: var(--gold); border-bottom: 2px solid var(--gold); }

  .map-section {
    max-width: 1400px;
    margin: 0 auto;
    padding: 1rem 2rem;
  }

  .map-container {
    background: var(--white);
    border-radius: 10px;
    box-shadow: var(--shadow);
    overflow: hidden;
  }

  .map-header {
    padding: .75rem 1.25rem;
    font-size: 1rem;
    font-weight: 600;
    color: var(--navy);
    border-bottom: 1px solid var(--gray-light);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  #campground-map {
    height: calc(100vh - 220px);
    min-height: 400px;
    width: 100%;
  }

  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: .5rem .75rem;
    padding: .75rem 1.25rem;
    border-top: 1px solid var(--gray-light);
    font-size: .82rem;
    color: var(--gray);
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: .3rem;
    cursor: pointer;
    user-select: none;
  }

  .legend-item.dimmed { opacity: .35; }

  .legend-swatch {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    border: 2px solid rgba(0,0,0,.25);
    flex-shrink: 0;
  }
</style>
</head>
<body>

<header>
  <h1><a href="/" style="color:inherit;text-decoration:none">EKKO Trips</a></h1>
  <div class="stats">
    <div><span>{{ trip_count }}</span> trips</div>
    <div><span>{{ night_count }}</span> nights</div>
  </div>
</header>

<nav>
  <a href="/trips/map">Trips Map</a>
  <a href="/trips/calendar">Trips Calendar</a>
  <a href="/campgrounds/waterfront" {% if color_field == 'waterfront' %}class="active"{% endif %}>Waterfront Map</a>
  <a href="/campgrounds/climate" {% if color_field == 'climate' %}class="active"{% endif %}>Climate Map</a>
  {% if current_user.is_authenticated %}
  <a href="/logout" style="margin-left:auto">Logout</a>
  {% else %}
  <a href="/login" style="margin-left:auto">Login</a>
  {% endif %}
</nav>

<div class="map-section">
  <div class="map-container">
    <div class="map-header">
      <span>{{ title }}</span>
    </div>
    <div id="campground-map"></div>
    <div class="legend" id="legend"></div>
  </div>
</div>

<script>
const CAMPGROUNDS = {{ campgrounds | tojson }};
const COLOR_MAP = {{ color_map | tojson }};
const COLOR_FIELD = {{ color_field | tojson }};
const HOME = {{ home | tojson }};
const FAMILY = {{ family_locations | tojson }};

// ── Build legend ──────────────────────────────────────────────────────────
const legendEl = document.getElementById('legend');
const activeCategories = new Set(Object.keys(COLOR_MAP));
const categoryMarkers = {};  // category -> [marker, ...]

Object.entries(COLOR_MAP).forEach(([category, color]) => {
  const count = CAMPGROUNDS.filter(c => (c[COLOR_FIELD] || 'none') === category).length;
  const item = document.createElement('div');
  item.className = 'legend-item';
  item.innerHTML = `<span class="legend-swatch" style="background:${color}"></span>${category} (${count})`;
  item.addEventListener('click', () => toggleCategory(category, item));
  legendEl.appendChild(item);
  categoryMarkers[category] = [];
});

function toggleCategory(category, item) {
  if (activeCategories.has(category)) {
    activeCategories.delete(category);
    item.classList.add('dimmed');
    categoryMarkers[category].forEach(m => m.setStyle({ opacity: 0, fillOpacity: 0 }));
  } else {
    activeCategories.add(category);
    item.classList.remove('dimmed');
    categoryMarkers[category].forEach(m => m.setStyle({ opacity: 1, fillOpacity: 0.8 }));
  }
}

// ── Build map ─────────────────────────────────────────────────────────────
const map = L.map('campground-map');
const streets = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OpenStreetMap contributors',
  maxZoom: 18,
}).addTo(map);
const satellite = L.layerGroup([
  L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
    attribution: '&copy; Esri',
    maxZoom: 19,
  }),
  L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}', {
    maxZoom: 19,
  }),
]);
L.control.layers({ 'Map': streets, 'Satellite': satellite }).addTo(map);

// Home marker
if (HOME) {
  const homeIcon = L.divIcon({
    className: '',
    html: `<div style="
      width:24px;height:24px;border-radius:50%;
      background:#c9a84c;
      display:flex;align-items:center;justify-content:center;
      border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.4);
    "><svg width="14" height="14" viewBox="0 0 20 20" fill="#002868"><path d="M10 2 L2 9 L5 9 L5 17 L9 17 L9 12 L11 12 L11 17 L15 17 L15 9 L18 9 Z"/></svg></div>`,
    iconSize: [24, 24],
    iconAnchor: [12, 12],
  });
  L.marker(HOME, { icon: homeIcon, zIndexOffset: 1000 }).addTo(map)
    .bindPopup('<strong>Home</strong>');
}

// Family location markers
FAMILY.forEach(fam => {
  const ll = [fam.lat, fam.lng];
  const famIcon = L.divIcon({
    className: '',
    html: `<div style="
      width:24px;height:24px;border-radius:50%;
      background:#c9a84c;
      display:flex;align-items:center;justify-content:center;
      border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.4);
    "><svg width="14" height="14" viewBox="0 0 20 20" fill="#002868"><path d="M10 2 L2 9 L5 9 L5 17 L9 17 L9 12 L11 12 L11 17 L15 17 L15 9 L18 9 Z"/><circle cx="14" cy="6" r="2.5"/><circle cx="17" cy="6" r="2.5"/></svg></div>`,
    iconSize: [24, 24],
    iconAnchor: [12, 12],
  });
  L.marker(ll, { icon: famIcon, zIndexOffset: 900 }).addTo(map)
    .bindPopup(`<strong>${fam.label}</strong>`);
});

// Campground markers
const familyCoords = FAMILY.map(f => [f.lat, f.lng]);
const bounds = (HOME ? [HOME] : []).concat(familyCoords);

CAMPGROUNDS.forEach(cg => {
  const parts = cg.location.split(',');
  const lat = parseFloat(parts[0]);
  const lng = parseFloat(parts[1]);
  const ll = [lat, lng];
  bounds.push(ll);

  const category = cg[COLOR_FIELD] || 'none';
  const color = COLOR_MAP[category] || '#888';

  const marker = L.circleMarker(ll, {
    radius: 6,
    fillColor: color,
    color: '#fff',
    weight: 1.5,
    opacity: 1,
    fillOpacity: 0.8,
  }).addTo(map);

  let popup = `<strong>${cg.name}</strong>`;
  if (cg.state) popup += `<br>${cg.state}`;
  popup += `<br><em>${category}</em>`;
  if (cg.elevation_feet) popup += `<br>${cg.elevation_feet} ft`;
  if (cg.visited === 'yes') popup += `<br><span style="color:#2e7d32;">&#10003; visited</span>`;
  if (cg.website) {
    const url = cg.website.split('\n')[0];
    popup += `<br><a href="${url}" target="_blank" rel="noopener">website</a>`;
  }
  marker.bindPopup(popup, { maxWidth: 280 });

  if (categoryMarkers[category]) {
    categoryMarkers[category].push(marker);
  }
});

if (bounds.length) {
  map.fitBounds(bounds, { padding: [30, 30], maxZoom: 8 });
}
</script>

</body>
</html>
