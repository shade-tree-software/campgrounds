<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EKKO Trips — Poster</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  :root {
    --navy: #002868;
    --red: #bf0a30;
    --gold: #c9a84c;
    --paper: #fafaf6;
    --ink: #1d1d1f;
    --rule: #c8c0a8;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    background: #2a2a2e;
    min-height: 100vh;
    color: var(--ink);
    font-family: 'Georgia', 'Garamond', 'Times New Roman', serif;
    /* Hide overflow on the body so the poster's drop-shadow never spills
       scrollbars; the sheet sizes itself to fit the viewport. */
    overflow: hidden;
  }

  /* The poster sheet — fixed 8.5×11 portrait aspect ratio. Sized to fit
     within the viewport while preserving its proportions. On a typical
     desktop screen, the height limit kicks in first; on narrow viewports
     the width limit takes over. Margin auto centers it both axes via the
     wrapping flex container below. */
  .poster-wrap {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    width: 100vw;
    padding: .75rem;
  }
  .poster-sheet {
    aspect-ratio: 8.5 / 11;
    background: var(--paper);
    box-shadow: 0 12px 40px rgba(0,0,0,.55), 0 2px 6px rgba(0,0,0,.4);
    /* Constrain by whichever viewport axis is the binding limit. The
       aspect-ratio property handles the other axis. Letter sheet is
       portrait so on most screens it's height-bound. */
    width: min(calc((100vh - 1.5rem) * 8.5 / 11), calc(100vw - 1.5rem));
    height: min(calc(100vh - 1.5rem), calc((100vw - 1.5rem) * 11 / 8.5));
    /* Four explicit rows — title auto-sized to content, the two photo
       strips at fixed percentages of the sheet height, and the map filling
       whatever's left. Without these explicit rows the four children
       would land in implicit auto-rows and the map would collapse to 0px
       while the photo cells inherited each image's natural aspect ratio
       (tall portrait shots = tall cells). The 12%/24% split gives a
       cell aspect of ~1.07 (slightly landscape) on the 8.5×11 sheet —
       a square split would need ~13%/26% but lands on a value where
       sub-pixel rounding can drift portrait; biasing landscape is
       explicitly preferred over portrait. The two strip percentages
       stay in a 1:2 ratio so per-cell height matches across both. */
    display: grid;
    grid-template-rows: auto 12% 1fr 24%;
    overflow: hidden;
    position: relative;
  }

  /* ── Title bar ────────────────────────────────────────────────── */
  .poster-title {
    text-align: center;
    padding: 2.2% 4% 1%;
    border-bottom: 2px solid var(--rule);
  }
  .poster-title h1 {
    font-size: 2.2cqw;
    font-weight: 700;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--navy);
    line-height: 1;
  }
  .poster-title h1 .amp {
    color: var(--red);
    margin: 0 .15em;
  }
  .poster-title .sub {
    font-size: .95cqw;
    font-style: italic;
    color: var(--gray, #555);
    margin-top: .25em;
    letter-spacing: .04em;
  }
  /* cqw doesn't always work — fall back to viewport units sized to the
     poster's width, which is height-driven on most screens. */
  .poster-sheet { container-type: inline-size; }

  /* ── Photo strips ─────────────────────────────────────────────── */
  .poster-photos {
    display: grid;
    gap: 2px;
    background: var(--rule);
    padding: 2px;
    overflow: hidden;
    /* min-height: 0 lets the grid item shrink to exactly its assigned
       row height (the 14% / 28% above) rather than expanding to fit the
       intrinsic size of the photos inside. */
    min-height: 0;
  }
  .poster-photos--top {
    grid-template-columns: repeat(12, 1fr);
    grid-template-rows: repeat(2, 1fr);
  }
  .poster-photos--bottom {
    grid-template-columns: repeat(12, 1fr);
    /* 4 rows over the 24% bottom band gives the same 6%/row as the top
       strip (2 rows over 12%). Same column count + same per-cell height
       = identical thumbnail aspect ratio across both strips. */
    grid-template-rows: repeat(4, 1fr);
  }
  .poster-thumb {
    background: #222;
    overflow: hidden;
    position: relative;
    /* Same min-height: 0 reason — the cell's height is the 1fr row
       height, not the image's natural size. */
    min-width: 0;
    min-height: 0;
  }
  .poster-thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  /* ── Map + callouts ───────────────────────────────────────────── */
  .poster-map-wrap {
    position: relative;
    overflow: hidden;
    border-top: 1px solid var(--rule);
    border-bottom: 1px solid var(--rule);
    /* min-height: 0 again — without it, Leaflet's tile pane could push
       the grid row past its 1fr allocation. */
    min-height: 0;
  }
  #poster-map {
    width: 100%;
    height: 100%;
    background: #d4dee5;
  }
  /* Leaflet's controls (zoom +/-, attribution) look out of place on a
     poster. Hide them entirely — readers won't be panning. */
  .poster-map-wrap .leaflet-control-zoom,
  .poster-map-wrap .leaflet-control-attribution { display: none; }

  /* SVG overlay carrying leader lines + callout boxes. Sits on top of
     the leaflet pane and intercepts no pointer events so the map below
     stays interactive (zoom-on-scroll is still disabled in JS). */
  .callout-svg {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 1000;
  }
  .callout-leader {
    fill: none;
    stroke: var(--navy);
    stroke-width: 1.1;
    stroke-linecap: round;
  }
  .callout-leader-dot {
    fill: var(--navy);
    stroke: #fff;
    stroke-width: 1;
  }
  .callout-box {
    fill: #fff;
    stroke: var(--navy);
    stroke-width: 1.1;
    rx: 4;
    ry: 4;
  }
  .callout-label {
    fill: var(--ink);
    font-family: -apple-system, 'Segoe UI', sans-serif;
    font-weight: 500;
    /* Sized for the printed poster: at letter scale these glyphs land
       around 13–14pt, well above the legibility floor. On-screen they
       look small but the poster's screen view is just a preview.
       Must stay in sync with TEXT_FONT in the script below so the
       canvas measurement matches the rendered glyph width. */
    font-size: 7px;
    dominant-baseline: central;
  }

  /* Print: hide the dark background, set page to letter portrait, and
     remove drop shadow so it prints cleanly edge-to-edge. */
  @media print {
    @page { size: letter portrait; margin: 0; }
    html, body { background: white; overflow: visible; }
    .poster-wrap { height: auto; padding: 0; }
    .poster-sheet {
      box-shadow: none;
      width: 100%;
      height: auto;
      aspect-ratio: 8.5 / 11;
    }
  }
</style>
</head>
<body>
<div class="poster-wrap">
  <div class="poster-sheet">
    <div class="poster-title">
      <h1>EKKO <span class="amp">&middot;</span> Trips</h1>
      <div class="sub">A travel record</div>
    </div>

    <div class="poster-photos poster-photos--top" id="photos-top"></div>

    <div class="poster-map-wrap">
      <div id="poster-map"></div>
      <svg class="callout-svg" id="callout-svg"></svg>
    </div>

    <div class="poster-photos poster-photos--bottom" id="photos-bottom"></div>
  </div>
</div>

<script>
const TRIPS = {{ trips | tojson }};
const FAMILY = {{ family_locations | tojson }};
const HOME = {{ home | tojson }};
const PHOTOS = {{ poster_photos | tojson }};

// ── Photo strips ────────────────────────────────────────────────────────────
// Top strip = 12 × 2 = 24 thumbs. Bottom strip = 12 × 5 = 60 thumbs. Picks
// from the shuffled `PHOTOS` pool sequentially via a shared cursor so the
// bottom strip continues past whatever the top consumed instead of repeating
// the same first images. Wraps with modulo only if the pool is exhausted.
let photoCursor = 0;
function fillPhotoGrid(elId, count) {
  const grid = document.getElementById(elId);
  if (!grid || !PHOTOS.length) return;
  for (let i = 0; i < count; i++) {
    const div = document.createElement('div');
    div.className = 'poster-thumb';
    const photo = PHOTOS[photoCursor % PHOTOS.length];
    photoCursor++;
    const img = document.createElement('img');
    img.src = photo.thumb || photo.url;
    img.loading = 'lazy';
    img.alt = '';
    div.appendChild(img);
    grid.appendChild(div);
  }
}
fillPhotoGrid('photos-top', 24);
fillPhotoGrid('photos-bottom', 48);

// ── Map ─────────────────────────────────────────────────────────────────────
// Same data plumbing as trips_map.html but stripped to the essentials: small
// markers (no popups — viewers don't click a poster), no layer toggle, no
// banner. Zoom controls disabled because the poster is meant to be a static
// snapshot.
const map = L.map('poster-map', {
  zoomControl: false,
  attributionControl: false,
  scrollWheelZoom: false,
  doubleClickZoom: false,
  boxZoom: false,
  keyboard: false,
  dragging: false,
  touchZoom: false,
  // Quarter-step zoom so fitBounds can land between integer levels
  // for tighter framing. Tiles for the next-coarser integer level
  // are CSS-scaled up; no extra tile fetches and no pixel-doubling
  // artifacts.
  zoomSnap: 0.25,
});
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 18 }).addTo(map);

const bounds = HOME ? [HOME] : [];

// Home marker (red house)
if (HOME) {
  const homeIcon = L.divIcon({
    className: '',
    html: `<div style="
      width:20px;height:20px;border-radius:50%;
      background:#bf0a30;
      display:flex;align-items:center;justify-content:center;
      border:2px solid #fff;box-shadow:0 1px 3px rgba(0,0,0,.4);
    "><svg width="11" height="11" viewBox="0 0 20 20" fill="#fff"><path d="M10 2 L2 9 L5 9 L5 17 L9 17 L9 12 L11 12 L11 17 L15 17 L15 9 L18 9 Z"/></svg></div>`,
    iconSize: [20, 20],
    iconAnchor: [10, 10],
  });
  L.marker(HOME, { icon: homeIcon, zIndexOffset: 1000 }).addTo(map);
}

// Campspot markers — collapse stays at the same campground onto one dot,
// sized by visit count (same logic as trips_map.html).
const locMap = {};
TRIPS.forEach(trip => {
  trip.stays.forEach((stay) => {
    let key, lat, lng;
    if (stay.campground_id != null && stay.cg_lat != null && stay.cg_lng != null) {
      key = 'cg:' + stay.campground_id;
      lat = stay.cg_lat;
      lng = stay.cg_lng;
    } else if (stay.lat != null && stay.lng != null) {
      key = 'coords:' + stay.lat.toFixed(4) + ',' + stay.lng.toFixed(4);
      lat = stay.lat;
      lng = stay.lng;
    } else {
      return;
    }
    if (!locMap[key]) locMap[key] = { lat, lng, visits: 0 };
    locMap[key].visits += 1;
  });
});
Object.values(locMap).forEach(loc => {
  const ll = [loc.lat, loc.lng];
  bounds.push(ll);
  L.circleMarker(ll, {
    radius: Math.min(4 + loc.visits, 9),
    fillColor: '#002868',
    color: '#fff',
    weight: 1.2,
    opacity: 1,
    fillOpacity: 0.9,
  }).addTo(map);
});

// Event markers (gold)
TRIPS.forEach(trip => {
  (trip.events || []).forEach(evt => {
    if (!evt.lat || !evt.lng || evt.waypoint) return;
    bounds.push([evt.lat, evt.lng]);
    L.circleMarker([evt.lat, evt.lng], {
      radius: 5,
      fillColor: '#c9a84c',
      color: '#fff',
      weight: 1,
      opacity: 1,
      fillOpacity: 0.9,
    }).addTo(map);
  });
});

// Family markers (red houses)
FAMILY.forEach(fam => {
  bounds.push([fam.lat, fam.lng]);
  const famIcon = L.divIcon({
    className: '',
    html: `<div style="
      width:18px;height:18px;border-radius:50%;
      background:#bf0a30;
      display:flex;align-items:center;justify-content:center;
      border:2px solid #fff;box-shadow:0 1px 3px rgba(0,0,0,.4);
    "><svg width="10" height="10" viewBox="0 0 20 20" fill="#fff"><path d="M10 2 L2 9 L5 9 L5 17 L9 17 L9 12 L11 12 L11 17 L15 17 L15 9 L18 9 Z"/></svg></div>`,
    iconSize: [18, 18],
    iconAnchor: [9, 9],
  });
  L.marker([fam.lat, fam.lng], { icon: famIcon, zIndexOffset: 900 }).addTo(map);
});

// Initial fitBounds — Leaflet won't mark the map as "loaded" (and so
// won't fire `whenReady`) until a view has been set, and without
// `whenReady` neither invalidateSize nor the tile loader ever runs. We
// re-run fitBounds inside the whenReady handler below after
// invalidateSize so the final framing reflects the actual container
// box; this first call exists purely to kick the load lifecycle off.
if (bounds.length) {
  // No maxZoom: let Leaflet zoom in as tight as the marker bounds allow.
  map.fitBounds(bounds, { padding: [2, 2] });
} else {
  map.setView([39.5, -98.35], 4);  // CONUS-ish fallback if no anchors
}

// ── Callouts ───────────────────────────────────────────────────────────────
// One callout per dated trip. Each is anchored to a chosen "pinpoint" (first
// stay if available, else first non-waypoint event), then placed at an evenly
// spaced slot along whichever map perimeter side is closest by angle. Even
// spacing along each side means no two callouts can overlap — and binning by
// closest side keeps the leader lines short enough that the angular ordering
// still mostly mirrors the pinpoint geography.
//
// Wait until Leaflet has settled the view (`moveend` fires after the
// programmatic fitBounds above) — otherwise latLngToContainerPoint reads
// the pre-fit center.
function placeCallouts() {
  const svg = document.getElementById('callout-svg');
  const mapEl = document.getElementById('poster-map');
  const mw = mapEl.clientWidth;
  const mh = mapEl.clientHeight;
  if (!mw || !mh) return;
  svg.setAttribute('viewBox', `0 0 ${mw} ${mh}`);
  svg.setAttribute('width', mw);
  svg.setAttribute('height', mh);
  while (svg.firstChild) svg.removeChild(svg.firstChild);

  // Build the list of trip-anchors. Skip empty trips (no dates → no
  // chronological number) and trips with no stay/event coordinates to point
  // at. `trip.number` is the user-facing display number computed by
  // parse_trips() based on sort position. Among each trip's candidate
  // coords (stays + non-waypoint events) we prefer the one *farthest from
  // HOME* so the callout highlights the destination rather than an early
  // stopover — but never let two callouts share a pinpoint. To resolve
  // collisions we rank each trip's candidates farthest-first, then walk
  // trips in priority order (longest first, matching the placement
  // greediness below) and have each trip claim its farthest unclaimed
  // candidate. Trips whose every candidate is already claimed are dropped.
  // Squared lat/lng distance is fine — we only need an ordering.
  function rankByDistanceFromHome(candidates) {
    if (!HOME) return candidates.slice();
    const [hLat, hLng] = HOME;
    return candidates.slice().sort((a, b) => {
      const da = (a.lat - hLat) ** 2 + (a.lng - hLng) ** 2;
      const db = (b.lat - hLat) ** 2 + (b.lng - hLng) ** 2;
      return db - da;  // farthest from home first
    });
  }
  const tripCandidates = [];
  TRIPS.forEach(trip => {
    if (!trip.number || !trip.start) return;
    const candidates = [];
    for (const s of trip.stays) {
      if (s.lat != null && s.lng != null) candidates.push({ lat: s.lat, lng: s.lng });
    }
    for (const e of (trip.events || [])) {
      if (e.lat != null && e.lng != null && !e.waypoint) {
        candidates.push({ lat: e.lat, lng: e.lng });
      }
    }
    if (!candidates.length) return;
    tripCandidates.push({ trip, ranked: rankByDistanceFromHome(candidates) });
  });
  // 4-decimal coord key (~11 m) — same fuzz factor used by the dedupe in
  // the campspot loop above; coincident stays land on one bucket.
  const claimedPins = new Set();
  const pinKey = (p) => p.lat.toFixed(4) + ',' + p.lng.toFixed(4);
  const anchors = [];
  tripCandidates
    .slice()
    .sort((a, b) => (b.trip.total_nights || 0) - (a.trip.total_nights || 0))
    .forEach(({ trip, ranked }) => {
      const pin = ranked.find(c => !claimedPins.has(pinKey(c)));
      if (!pin) return;  // every candidate already claimed by another trip
      claimedPins.add(pinKey(pin));
      anchors.push({ trip, pin });
    });

  const cx = mw / 2;
  const cy = mh / 2;
  anchors.forEach(a => {
    const pt = map.latLngToContainerPoint([a.pin.lat, a.pin.lng]);
    a.px = pt.x;
    a.py = pt.y;
    a.angle = Math.atan2(pt.y - cy, pt.x - cx);  // -π .. π (0 = east)
  });

  // Layout constants. Callouts are small pill-shaped boxes containing
  // just the trip summary text — no trip number, no number circle.
  // Sized tight: the poster is intended for print at letter size, so
  // on-screen pills look small but render legibly at print scale.
  const BOX_H = 14;
  const PAD_X = 3;
  const GAP = 2;  // inter-pill spacing on every side
  const TEXT_FONT = '500 7px -apple-system, Segoe UI, sans-serif';
  const MARGIN = 8;  // pixels from the map edge to the callout's outer side

  // Measure each callout's natural width — left-padding + summary text
  // + right-padding. The summary is rendered untruncated so the full
  // trip name is always visible; pills wider than `mw - 2*MARGIN` are
  // rejected by canPlace below and fall through to a vertical side,
  // where capacity is by count rather than accumulated width.
  const measure = document.createElement('canvas').getContext('2d');
  measure.font = TEXT_FONT;
  anchors.forEach(a => {
    const summary = a.trip.summary || '';
    a.summary = summary;
    a.boxW = PAD_X + measure.measureText(summary).width + PAD_X;
  });

  // Greedy, capacity-aware placement. Trips with the most nights are
  // placed first; once neither vertical stack has room, the remaining
  // (shortest) trips are dropped so callouts never overflow the map.
  // Each anchor prefers the side its pin sits in (right half-plane =
  // right stack, left half-plane = left stack), then falls back to the
  // other side. Top/bottom rows are intentionally not used — every
  // callout lives in one of the two vertical stacks. The vertical band
  // can therefore use the full inner height (MARGIN..mh-MARGIN);
  // there's no horizontal row to clear at the corners.
  const VERT_BAND_TOP = MARGIN;
  const VERT_BAND_BOT = mh - MARGIN;
  const VERT_BAND_H = Math.max(0, VERT_BAND_BOT - VERT_BAND_TOP);
  const VERT_CAP = Math.max(0, Math.floor((VERT_BAND_H + GAP) / (BOX_H + GAP)));
  function preferredSide(angle) {
    // Right half-plane (-π/2 .. π/2) → right stack; otherwise left.
    return (angle >= -Math.PI/2 && angle < Math.PI/2) ? 'right' : 'left';
  }
  const sides = { right: [], left: [] };
  const fallback = {
    left:  ['left',  'right'],
    right: ['right', 'left'],
  };
  function canPlace(side) {
    return sides[side].length < VERT_CAP;
  }
  [...anchors]
    .sort((a, b) => (b.trip.total_nights || 0) - (a.trip.total_nights || 0))
    .forEach(a => {
      for (const side of fallback[preferredSide(a.angle)]) {
        if (canPlace(side)) { sides[side].push(a); return; }
      }
      // Both stacks are full — this anchor is dropped.
    });

  // Within each side, sort anchors by their position along that side's
  // primary axis (x for top/bottom, y for left/right) so leader lines
  // mostly run inward without crossing. Vertical stacks are clamped to
  // the safe y-band, which keeps them out of the top/bottom rows'
  // y-bands; horizontal rows can therefore use the full inner width.
  function placeSide(list, side) {
    if (!list.length) return;
    // Two-stage arrangement:
    //  (1) Geography — split the list into a northern half (smaller
    //      pin py = farther up the map) and a southern half by
    //      median y, so callouts in the top of the stack point to
    //      northern locations and callouts in the bottom of the
    //      stack point to southern ones. Leader lines stay short
    //      and roughly stop crossing.
    //  (2) Bow-tie within each half — widest pill at the outer
    //      end (topmost of the north half / bottommost of the
    //      south half), narrowest toward the stack center, so
    //      short pills cluster around the middle of the stack
    //      regardless of their pin's latitude.
    const sortedByY = [...list].sort((a, b) => a.py - b.py);
    const half = Math.ceil(sortedByY.length / 2);
    const northern = sortedByY.slice(0, half).sort((a, b) => b.boxW - a.boxW);
    const southern = sortedByY.slice(half).sort((a, b) => a.boxW - b.boxW);
    const arranged = [...northern, ...southern];
    const x = side === 'left' ? MARGIN : (mw - MARGIN);
    const totalH = arranged.length * BOX_H + (arranged.length - 1) * GAP;
    let y = VERT_BAND_TOP + Math.max(0, (VERT_BAND_H - totalH) / 2) + BOX_H / 2;
    arranged.forEach(a => {
      a.boxCenter = { x: side === 'left' ? x + a.boxW / 2 : x - a.boxW / 2, y };
      a.side = side;
      y += BOX_H + GAP;
    });
  }
  placeSide(sides.left, 'left');
  placeSide(sides.right, 'right');

  // Draw each callout: leader line first (so it sits behind), then the
  // pinpoint dot (small navy circle marking the actual location), then the
  // box and text.
  const NS = 'http://www.w3.org/2000/svg';
  anchors.forEach(a => {
    if (!a.boxCenter) return;
    const bx = a.boxCenter.x;
    const by = a.boxCenter.y;
    // Leader attaches to whichever box edge faces the pinpoint, so the
    // line never visually crosses the box.
    let lx2 = bx, ly2 = by;
    if (a.side === 'top') ly2 = by + BOX_H / 2;
    else if (a.side === 'bottom') ly2 = by - BOX_H / 2;
    else if (a.side === 'left') lx2 = bx + a.boxW / 2;
    else lx2 = bx - a.boxW / 2;

    const line = document.createElementNS(NS, 'line');
    line.setAttribute('x1', a.px);
    line.setAttribute('y1', a.py);
    line.setAttribute('x2', lx2);
    line.setAttribute('y2', ly2);
    line.setAttribute('class', 'callout-leader');
    svg.appendChild(line);

    // Small dot at the pinpoint itself — distinguishes the actual location
    // from the regular markers below.
    const dot = document.createElementNS(NS, 'circle');
    dot.setAttribute('cx', a.px);
    dot.setAttribute('cy', a.py);
    dot.setAttribute('r', 2.5);
    dot.setAttribute('class', 'callout-leader-dot');
    svg.appendChild(dot);

    // Rounded box.
    const rect = document.createElementNS(NS, 'rect');
    rect.setAttribute('x', bx - a.boxW / 2);
    rect.setAttribute('y', by - BOX_H / 2);
    rect.setAttribute('width', a.boxW);
    rect.setAttribute('height', BOX_H);
    rect.setAttribute('class', 'callout-box');
    svg.appendChild(rect);

    // Trip summary only — no number.
    const label = document.createElementNS(NS, 'text');
    label.setAttribute('x', bx - a.boxW / 2 + PAD_X);
    label.setAttribute('y', by);
    label.setAttribute('class', 'callout-label');
    label.textContent = a.summary;
    svg.appendChild(label);
  });
}

// Render the callouts once Leaflet has finished the fitBounds animation, and
// again on any window resize (re-fit then redraw).
map.whenReady(() => {
  // The map container is in a grid cell whose height depends on the
  // sheet's aspect-ratio resolving — which can lag by one frame on
  // first paint. invalidateSize() forces Leaflet to re-read the
  // container box so tiles/markers don't end up cropped from a
  // moment-in-time stale measurement.
  map.invalidateSize();
  if (bounds.length) map.fitBounds(bounds, { padding: [2, 2] });
  // `whenReady` fires before the fitBounds tween completes; wait for
  // moveend to be sure latLngToContainerPoint reflects the final view.
  map.once('moveend', placeCallouts);
  // Belt-and-braces in case fitBounds was effectively a no-op (single point):
  setTimeout(placeCallouts, 400);
});
window.addEventListener('resize', () => {
  map.invalidateSize();
  if (bounds.length) map.fitBounds(bounds, { padding: [2, 2] });
  // moveend handler above (or the setTimeout) will redraw.
  setTimeout(placeCallouts, 350);
});
</script>
</body>
